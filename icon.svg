<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="laser-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  
  <!-- Stylized Barcode Logo -->
  <g transform="translate(106, 120)">
    <!-- Barcode Bars -->
    <rect x="0" y="20" width="16" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="30" y="20" width="8" height="200" rx="4" fill="url(#primary-grad)" />
    <rect x="52" y="20" width="24" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="90" y="20" width="16" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="120" y="20" width="8" height="200" rx="4" fill="url(#primary-grad)" />
    <rect x="142" y="20" width="32" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="190" y="20" width="8" height="200" rx="4" fill="url(#primary-grad)" />
    <rect x="212" y="20" width="16" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="242" y="20" width="24" height="200" rx="6" fill="url(#primary-grad)" />
    <rect x="280" y="20" width="20" height="200" rx="6" fill="url(#primary-grad)" />
    
    <!-- Red Scanning Laser Line -->
    <line x1="-30" y1="120" x2="330" y2="120" stroke="#ef4444" stroke-width="8" stroke-linecap="round" filter="url(#laser-glow)" opacity="0.95" />
    
    <!-- Laser dots -->
    <circle cx="-30" cy="120" r="5" fill="#ef4444" />
    <circle cx="330" cy="120" r="5" fill="#ef4444" />
  </g>
  
  <!-- Status badge on bottom right -->
  <rect x="290" y="290" width="140" height="140" rx="36" fill="#10b981" />
  <!-- Checkmark -->
  <path d="M335 362 L360 387 L400 337" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
